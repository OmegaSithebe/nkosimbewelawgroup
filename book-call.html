    <link rel="stylesheet" href="css/style4.css">
    <!-- Linking Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<body>
    <header>
        <nav class="navbar section-content">
            <a href="index.html" class="nav-logo">
                <img src="./images/NKOSIMBEWElawgrouplogo.png" alt="Logo" class="logo">
            </a>
            <ul class="nav-menu">
                <button id="menu-close-button" class="fas fa-times"></button>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>

                <li class="nav-item">
                    <a href="about.html" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="services.html" class="nav-link">Services</a>
                </li>
                <li class="nav-item">
                    <a href="#contact"><button class="nav-link login-signup-button">Contact Us</button></a>
                </li>
            </ul>
            <button id="menu-open-button" class="fas fa-bars"></button>
        </nav>
    </header>

    <main>
      <section>
        <h1>Book Your 15-Minute Consultation</h1>
        <p>We look forward to discussing your rights and assisting you with our expertise.</p>
        <div class="bookingContainer">
          <div class="bookingMain">
          <form class="bookingForm" action="schedule_consultation.php" method="POST" onsubmit="return showBookingConfirmation(event)">
            <div class="bookingForm-group">
              <label for="fullname">Full Name</label>
              <input type="text" id="fullname" name="fullname" required placeholder="Enter your full name" />
            </div>
            <div class="bookingForm-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required placeholder="Enter your email address" />
            </div>
            <div class="bookingForm-group">
              <label for="preferredDate">Preferred Date</label>
              <input type="date" id="preferredDate" name="preferredDate" required />
            </div>
            <div class="bookingForm-group">
              <label for="preferredTime">Preferred Time</label>
              <input type="time" id="preferredTime" name="preferredTime" required />
            </div>
            <div class="bookingForm-group">
              <button type="submit">Schedule Consultation</button>
            </div>
          </form>
            <span id="callBooking"></span>
          </div>
        </div>
      </section>
      </main>

    <footer class="footer-section">
        <div class="section-content">
            <p class="copyright-text">&copy; <span id="current-year"></span> Nkosi Mbewe Law Group</p>
            <div class="social-link-list">
                <a href="https://www.facebook.com/groups/1901170070344029" class="social-link"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://www.linkedin.com/jobs/view/3877281735/?alternateChannel=search&refId=eb1dbaaa-c6f4-466b-9dc1-101bebeb7a49&trackingId=RsgJq8tsSxikSGvx9ITP7g%3D%3D" class="social-link"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://www.instagram.com/thelawsocietyofsouthafrica/?hl=en" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@jrlawgroup" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            </div>
            <p class="policy-text">
                <a href="#" class="policy-link">Privacy policy</a>
                <span class="separator">•</span>
                <a href="#" class="policy-link">Lesson policy</a>
            </p>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const menuOpenButton = document.getElementById('menu-open-button');
        const menuCloseButton = document.getElementById('menu-close-button');
        const navMenu = document.querySelector('.nav-menu');
        
        menuOpenButton.addEventListener('click', () => {
            navMenu.classList.add('active');
        });
        
        menuCloseButton.addEventListener('click', () => {
            navMenu.classList.remove('active');
        });
        
        // Set current year in footer
        document.getElementById('current-year').textContent = new Date().getFullYear();

        function showBookingConfirmation(event) {
          const form = event.target;
          const name = form.fullname.value;

          // Show confirmation but allow form to submit
          alert(`Thank you, ${name}, for booking your consultation. We will be in touch shortly!`);
          return true;
        }
    </script>
</body>
</html>
